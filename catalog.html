<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — GETSTUFF</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-header">
    <h1 class="page-header__title" id="page-title">Каталог</h1>
    <div class="page-header__breadcrumb">
      <a href="index.html">Главная</a> / <span id="breadcrumb-current">Каталог</span>
    </div>
  </div>

  <div class="catalog-layout">
    <aside>
      <button class="filters-toggle" id="filters-toggle">
        Фильтры
      </button>
      <div class="filters-panel" id="filters-panel"></div>
    </aside>

    <main>
      <div class="catalog-toolbar">
        <span id="products-count">Найдено: 0 товаров</span>
        <div class="catalog-sort">
          <select id="sort-select">
            <option value="default">По умолчанию</option>
            <option value="price-asc">Цена: по возрастанию</option>
            <option value="price-desc">Цена: по убыванию</option>
            <option value="rating">По рейтингу</option>
            <option value="name">По названию</option>
          </select>
        </div>
      </div>
      <div class="products-grid" id="catalog-grid"></div>
    </main>
  </div>

  <script src="js/products.data.js"></script>
  <script src="js/data.js"></script>
  <script src="js/wholesale.js"></script>
  <script src="js/prices.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script>
    renderLayout();
    initCatalogPage();
  </script>
</body>
</html>
